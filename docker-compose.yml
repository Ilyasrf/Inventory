services:
  db:
    image: postgres:15-alpine
    container_name: makina-db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: makina_db
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    build: ./back
    container_name: makina-backend
    ports:
      - "3001:3001"
    env_file:
      - .env
    depends_on:
      - db
    volumes:
      - backend-uploads:/app/uploads
    restart: unless-stopped

  frontend:
    build: ./front
    container_name: makina-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend-uploads:
  postgres-data:
